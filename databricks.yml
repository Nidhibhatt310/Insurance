# This is a Databricks asset bundle definition for insurance.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: insurance
  uuid: 4dc745e1-fe4c-4e64-8322-8330b4300709

include:
  - resources/*.yml

artifacts:
  insurance_whl:
    type: whl
    path: .
    build: "pip install build && python -m build --wheel"

# Variable declarations. These variables are assigned per target below.
variables:
  base_location:
    default: "abfss://insurance@nbadls1.dfs.core.windows.net"
  catalog:
    description: Unity Catalog name (includes env suffix, e.g. insurance_dev)
  env:
    description: Environment name (dev, qa, prod) — used for checkpoint paths
    default: dev
  cluster_id:
    description: Existing cluster ID to run jobs on
    default: "0424-012115-2jbdui76"


targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405613313220225.5.azuredatabricks.net
    variables:
      env: dev
      catalog: insurance_dev
    presets:
      artifacts_dynamic_version: true
  qa:
    mode: development
    workspace:
      host: https://adb-7405613313220225.5.azuredatabricks.net
      root_path: /Workspace/Users/kartikstudies29@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      env: qa
      catalog: insurance_qa
    permissions:
      - user_name: kartikstudies29@gmail.com
        level: CAN_MANAGE
  prod:
    mode: production
    workspace:
      host: https://adb-7405613313220225.5.azuredatabricks.net
      root_path: /Workspace/Users/kartikstudies29@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      env: prod
      catalog: insurance_prod
    permissions:
      - user_name: kartikstudies29@gmail.com
        level: CAN_MANAGE
