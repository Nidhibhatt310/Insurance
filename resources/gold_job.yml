resources:
  jobs:
    rdv_to_gold_job:
      name: "RDV → Gold (Star Schema)"
      tasks:
        - task_key: rdv_to_gold
          libraries:
            - whl: ../dist/*.whl
          python_wheel_task:
            package_name: insurance
            entry_point: main
            parameters:
              - "rdv_to_gold"
              - "${var.catalog}"
              - "${var.env}"
              - "${var.base_location}"
          existing_cluster_id: "${var.cluster_id}"
      queue:
        enabled: true
