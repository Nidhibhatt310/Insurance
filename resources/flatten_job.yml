resources:
  jobs:
    bronze_to_flatten_job:
      name: "Bronze → Flatten"
      tasks:
        - task_key: bronze_to_flatten
          libraries:
            - whl: ../dist/*.whl
          python_wheel_task:
            package_name: insurance
            entry_point: main
            parameters:
              - "bronze_to_flatten"
              - "${var.catalog}"
              - "${var.env}"
              - "${var.base_location}"
          existing_cluster_id: "${var.cluster_id}"
      queue:
        enabled: true
