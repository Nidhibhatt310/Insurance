resources:
  jobs:
    flatten_to_rdv_job:
      name: "Flatten → RDV"
      tasks:
        - task_key: flatten_to_rdv
          libraries:
            - whl: ../dist/*.whl
          python_wheel_task:
            package_name: insurance
            entry_point: main
            parameters:
              - "flatten_to_rdv"
              - "${var.catalog}"
              - "${var.env}"
              - "${var.base_location}"
          existing_cluster_id: "${var.cluster_id}"
      queue:
        enabled: true
